<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математичний тренажер</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: #87CEEB; 
            padding: 10px; /* Менші відступи для мобільних */
            margin: 0;
        }
        h1 { font-size: 2.5rem; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .screen { 
            display: none; 
            background: #fff; 
            border-radius: 20px; 
            padding: 20px; 
            width: 90%; /* Адаптивна ширина */
            max-width: 600px; 
            margin: 20px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }

        /* Кнопки меню */
        .menu-btn { 
            display: block; width: 100%; margin: 15px auto; 
            padding: 20px; border-radius: 15px; border: none; 
            background: #1e90ff; color: white; font-size: 1.4rem; 
            cursor: pointer; 
        }

        /* Стилі для рівнянь */
        #eqDisplay, #solverEq { 
            font-size: 2.5rem; /* Оптимально для телефону */
            margin: 20px 0; 
            font-weight: bold; 
            color: #2c3e50; 
            word-wrap: break-word; /* Щоб довгі рівняння не вилазили */
        }

        /* Поля введення */
        .input-wrap {
            display: flex;
            flex-wrap: wrap; /* Перенос на новий рядок, якщо не влазить */
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-field { 
            width: 70px; 
            padding: 10px; 
            font-size: 1.8rem; 
            text-align: center; 
            border: 2px solid #1e90ff; 
            border-radius: 10px; 
        }

        .action-btn { 
            background-color: #ff6347; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 15px; 
            font-size: 1.2rem; font-weight: bold; width: 80%; /* Кнопки на весь екран на моб */
        }

        .res { font-size: 1.8rem; margin: 15px; font-weight: bold; min-height: 1.5em; }
        label { font-size: 1.5rem; font-weight: bold; }

        /* Спеціальні налаштування для великих екранів (ПК) */
        @media (min-width: 600px) {
            h1 { font-size: 3.5rem; }
            #eqDisplay, #solverEq { font-size: 3.5rem; }
            .action-btn { width: auto; } /* На ПК кнопки звичайної ширини */
            .input-field { width: 90px; }
        }
    </style>
</head>
<body>

    <div id="menu" style="display:block;">
        <h1>Тренажер</h1>
        <button class="menu-btn" onclick="show('trainer')">Коефіцієнти</button>
        <button class="menu-btn" onclick="show('solver')">Неповні квадратні рівняння</button>
    </div>

    <div id="trainer" class="screen">
        <h2>Коефіцієнти:</h2>
        <div id="eqDisplay"></div>
        <div class="input-wrap">
            <div><label>a=</label><input type="number" id="aIn" class="input-field" inputmode="decimal"></div>
            <div><label>b=</label><input type="number" id="bIn" class="input-field" inputmode="decimal"></div>
            <div><label>c=</label><input type="number" id="cIn" class="input-field" inputmode="decimal"></div>
        </div>
        <button class="action-btn" onclick="checkT()">Перевірити</button>
        <div id="resT" class="res"></div>
        <button class="action-btn" style="background-color: #95a5a6;" onclick="show('menu')">Назад</button>
    </div>

    <div id="solver" class="screen">
        <h2>Розв'яжіть:</h2>
        <div id="solverEq"></div>
        <div class="input-wrap">
            <div><label>x₁=</label><input type="number" id="x1" class="input-field" inputmode="decimal"></div>
            <div><label>x₂=</label><input type="number" id="x2" class="input-field" inputmode="decimal"></div>
        </div>
        <button class="action-btn" onclick="checkS()">Перевірити</button>
        <div id="resS" class="res"></div>
        <button class="action-btn" style="background-color: #95a5a6;" onclick="show('menu')">Назад</button>
    </div>

    <script>
        let curA, curB, curC, sol1, sol2;

        function show(id) {
            document.querySelectorAll('.screen, #menu').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'trainer') genT();
            if(id === 'solver') genS();
        }

        function formatEq(a, b, c) {
            let res = "";
            if (a === 1) res += "x²";
            else if (a === -1) res += "-x²";
            else res += a + "x²";

            if (b !== 0) {
                let sign = b > 0 ? " + " : " - ";
                let val = Math.abs(b);
                res += sign + (val === 1 ? "" : val) + "x";
            }
            if (c !== 0) {
                res += (c > 0 ? " + " : " - ") + Math.abs(c);
            }
            return res + " = 0";
        }

        function genT() {
            curA = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 1);
            curB = Math.floor(Math.random() * 11) - 5;
            curC = Math.floor(Math.random() * 11) - 5;
            document.getElementById('eqDisplay').innerHTML = formatEq(curA, curB, curC);
            document.getElementById('resT').innerHTML = "";
        }

        function checkT() {
            let uA = parseFloat(document.getElementById('aIn').value);
            let uB = parseFloat(document.getElementById('bIn').value);
            let uC = parseFloat(document.getElementById('cIn').value);
            if(uA === curA && uB === curB && uC === curC) {
                document.getElementById('resT').innerHTML = "<span style='color: green;'>Правильно! ✨</span>";
                setTimeout(() => {
                    document.getElementById('aIn').value = "";
                    document.getElementById('bIn').value = "";
                    document.getElementById('cIn').value = "";
                    genT();
                }, 1000);
            } else {
                document.getElementById('resT').innerHTML = "<span style='color: red;'>Помилка! ❌</span>";
            }
        }

        function genS() {
            let type = Math.floor(Math.random() * 2);
            curA = Math.floor(Math.random() * 4) + 1;
            document.getElementById('resS').innerHTML = "";
            if (type === 0) { 
                curB = (Math.random() > 0.5 ? 1 : -1) * (curA * (Math.floor(Math.random() * 3) + 1));
                curC = 0;
                sol1 = 0; sol2 = -curB / curA;
            } else { 
                curB = 0;
                let root = Math.floor(Math.random() * 4) + 1;
                curC = -(curA * root * root);
                sol1 = root; sol2 = -root;
            }
            document.getElementById('solverEq').innerHTML = formatEq(curA, curB, curC);
        }

        function checkS() {
            let v1 = parseFloat(document.getElementById('x1').value);
            let v2 = parseFloat(document.getElementById('x2').value);
            let correct = (Math.abs(v1 - sol1) < 0.1 && Math.abs(v2 - sol2) < 0.1) || 
                          (Math.abs(v1 - sol2) < 0.1 && Math.abs(v2 - sol1) < 0.1);
            if(correct) {
                document.getElementById('resS').innerHTML = "<span style='color: green;'>Правильно! 🎉</span>";
                setTimeout(() => {
                    document.getElementById('x1').value = "";
                    document.getElementById('x2').value = "";
                    genS();
                }, 1000);
            } else {
                document.getElementById('resS').innerHTML = "<span style='color: red;'>Спробуй ще! ❌</span>";
            }
        }
    </script>
</body>
</html>
